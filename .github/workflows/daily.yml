name: Daily Weather Collection

on:
  schedule:
    # Runs every day at 8:00 AM UTC (1:00 AM Pacific)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allows you to manually trigger it too

jobs:
  collect:
    runs-on: ubuntu-latest

    # This permission lets the action push commits back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect weather data
        run: python collect.py

      - name: Commit and push
        run: |
          git config user.name "Weather Bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📊 Weather data for $(date -u +%Y-%m-%d)"
          git push

name: Daily Weather Collection

on:
  schedule:
    # Runs 4 times a day at different hours
    - cron: '0 7 * * *'
    - cron: '30 12 * * *'
    - cron: '0 18 * * *'
    - cron: '45 23 * * *'
  workflow_dispatch:  # Manual trigger always works

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Random skip check
        id: dice
        run: |
          # Generate a random number 1-100
          ROLL=$((RANDOM % 100 + 1))
          echo "Rolled: $ROLL"
          # ~65% chance to proceed, ~35% chance to skip
          # This means some days get 1 commit, some get 4, most get 2-3
          if [ $ROLL -le 65 ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✓ Proceeding with data collection"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✗ Skipping this run (natural randomness)"
          fi

      - name: Checkout repo
        if: steps.dice.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.dice.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect weather data
        if: steps.dice.outputs.skip == 'false'
        run: python collect.py

      - name: Commit and push
        if: steps.dice.outputs.skip == 'false'
        run: |
          git config user.name "fewr"
          git config user.email "17171002+fewr@users.noreply.github.com""
          git add -A
          git diff --staged --quiet || git commit -m "📊 Weather data for $(date -u +%Y-%m-%d) — $(date -u +%H:%M) UTC"
          git push
